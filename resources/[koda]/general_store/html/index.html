<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Store</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" class="ornament-sprite">
        <defs>
            <symbol id="ornament-shell-corner" viewBox="0 0 52 52">
                <path fill="none" stroke="currentColor" stroke-width="1.35" d="M2 50 V2 H50" />
                <path fill="none" stroke="currentColor" stroke-width="0.85" d="M8 44 V8 H44" />
                <path fill="none" stroke="currentColor" stroke-width="0.9" d="M14 38 C14 18, 34 18, 38 14" />
                <path fill="none" stroke="currentColor" stroke-width="0.75" d="M14 38 C14 30, 22 26, 30 22" />
                <circle cx="6" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="0.85" />
                <circle cx="6" cy="6" r="1" fill="currentColor" />
                <path fill="currentColor" d="M6 2.5 L7.2 6 L6 9.5 L4.8 6 Z" opacity="0.75" />
                <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="0.75" />
                <line x1="24" y1="2" x2="24" y2="5" stroke="currentColor" stroke-width="0.65" />
                <line x1="2" y1="16" x2="6" y2="16" stroke="currentColor" stroke-width="0.75" />
                <line x1="2" y1="24" x2="5" y2="24" stroke="currentColor" stroke-width="0.65" />
            </symbol>
            <symbol id="ornament-rule" viewBox="0 0 280 22">
                <path fill="none" stroke="currentColor" stroke-width="0.95" d="M8 11 C8 5.5, 14 3, 18 11 C14 18.5, 8 16.5, 8 11" />
                <path fill="none" stroke="currentColor" stroke-width="0.85" d="M22 11 C22 8, 25 6.5, 28 11 C25 15.5, 22 14, 22 11" />
                <line x1="34" y1="11" x2="118" y2="11" stroke="currentColor" stroke-width="0.9" />
                <circle cx="140" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="0.85" />
                <circle cx="140" cy="11" r="3.5" fill="none" stroke="currentColor" stroke-width="0.65" />
                <path fill="currentColor" d="M140 5.5 L143.5 11 L140 16.5 L136.5 11 Z" />
                <path fill="currentColor" d="M134 11 L140 8 L146 11 L140 14 Z" opacity="0.55" />
                <line x1="162" y1="11" x2="246" y2="11" stroke="currentColor" stroke-width="0.9" />
                <path fill="none" stroke="currentColor" stroke-width="0.85" d="M252 11 C252 8, 255 6.5, 258 11 C255 15.5, 252 14, 252 11" />
                <path fill="none" stroke="currentColor" stroke-width="0.95" d="M262 11 C262 5.5, 268 3, 272 11 C268 18.5, 262 16.5, 262 11" />
            </symbol>
            <symbol id="ornament-title-rule" viewBox="0 0 320 18">
                <line x1="0" y1="9" x2="118" y2="9" stroke="currentColor" stroke-width="0.85" />
                <path fill="none" stroke="currentColor" stroke-width="0.8" d="M124 9 C124 5, 128 3, 132 9 C128 15, 124 13, 124 9" />
                <rect x="138" y="5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="0.75" transform="rotate(45 142 9)" />
                <circle cx="142" cy="9" r="1.2" fill="currentColor" />
                <rect x="150" y="5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="0.75" transform="rotate(45 154 9)" />
                <circle cx="154" cy="9" r="1.2" fill="currentColor" />
                <rect x="162" y="5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="0.75" transform="rotate(45 166 9)" />
                <circle cx="166" cy="9" r="1.2" fill="currentColor" />
                <rect x="174" y="5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="0.75" transform="rotate(45 178 9)" />
                <circle cx="178" cy="9" r="1.2" fill="currentColor" />
                <path fill="none" stroke="currentColor" stroke-width="0.8" d="M188 9 C188 5, 192 3, 196 9 C192 15, 188 13, 188 9" />
                <line x1="202" y1="9" x2="320" y2="9" stroke="currentColor" stroke-width="0.85" />
            </symbol>
            <symbol id="ornament-section" viewBox="0 0 200 16">
                <path fill="none" stroke="currentColor" stroke-width="0.85" d="M4 8 C4 4.5, 7.5 3, 10 8 C7.5 13, 4 11.5, 4 8" />
                <line x1="14" y1="8" x2="78" y2="8" stroke="currentColor" stroke-width="0.85" />
                <path fill="currentColor" d="M88 4.5 L91 8 L88 11.5 L85 8 Z" />
                <circle cx="100" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="0.75" />
                <path fill="currentColor" d="M112 4.5 L115 8 L112 11.5 L109 8 Z" />
                <line x1="122" y1="8" x2="186" y2="8" stroke="currentColor" stroke-width="0.85" />
                <path fill="none" stroke="currentColor" stroke-width="0.85" d="M190 8 C190 4.5, 193.5 3, 196 8 C193.5 13, 190 11.5, 190 8" />
            </symbol>
            <symbol id="ornament-frame-corner" viewBox="0 0 28 28">
                <path fill="none" stroke="currentColor" stroke-width="1" d="M1 27 V1 H27" />
                <path fill="none" stroke="currentColor" stroke-width="0.65" d="M5 23 V5 H23" />
                <path fill="none" stroke="currentColor" stroke-width="0.7" d="M8 20 C8 10, 18 10, 20 8" />
                <circle cx="4" cy="4" r="1.5" fill="none" stroke="currentColor" stroke-width="0.65" />
                <circle cx="4" cy="4" r="0.55" fill="currentColor" />
            </symbol>
        </defs>
    </svg>
    <div id="app" class="app" aria-hidden="true">
        <div class="backdrop"></div>
        <div id="propRotateZone" class="prop-rotate-zone" aria-hidden="true"></div>
        <p id="rotateHint" class="rotate-hint">Drag right area - rotate showcase</p>
        <div class="shell shell--dock-left shell--vintage">
            <svg class="vintage-corner-svg vintage-corner-svg--tl" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
            <svg class="vintage-corner-svg vintage-corner-svg--tr" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
            <svg class="vintage-corner-svg vintage-corner-svg--bl" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
            <svg class="vintage-corner-svg vintage-corner-svg--br" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
            <section class="shop-pane">
                <header class="shop-topbar">
                    <div class="topbar-ledger-line" aria-hidden="true"></div>
                    <div class="topbar-inner">
                        <div class="topbar-brand">
                            <div class="topbar-kicker-block">
                                <svg class="ornament ornament--kicker" preserveAspectRatio="none" aria-hidden="true"><use href="#ornament-rule" /></svg>
                                <p class="topbar-kicker" id="storeKicker">General Store</p>
                            </div>
                            <img id="storeLogo" class="store-logo" alt="" hidden />
                            <h1 id="storeTitle" class="title">&mdash;</h1>
                            <svg class="ornament ornament--title-rule" preserveAspectRatio="none" aria-hidden="true"><use href="#ornament-title-rule" /></svg>
                        </div>
                        <div class="topbar-divider" aria-hidden="true"></div>
                        <div class="topbar-tools">
                            <div class="wallet-chip">
                                <span class="wallet-label">Balance</span>
                                <span id="walletValue" class="wallet-value">$0.00</span>
                            </div>
                            <button type="button" class="bag-btn" id="btnOpenBag" disabled title="Open bag">
                                <span class="bag-btn-label">Bag</span>
                                <span id="cartBadge" class="bag-btn-badge">0</span>
                            </button>
                            <button type="button" class="bag-btn sell-btn" id="btnSellMode" hidden title="Sell items to store">
                                <span class="bag-btn-label">Sell</span>
                                <span id="sellBadge" class="bag-btn-badge">0</span>
                            </button>
                            <button type="button" class="bag-btn manage-btn" id="btnManageStore" hidden title="Manage store">
                                <span class="bag-btn-label">Manage</span>
                                <span id="manageRoleBadge" class="bag-btn-badge">-</span>
                            </button>
                            <button type="button" class="icon-btn close-btn" id="btnClose" title="Close (Esc)">&times;</button>
                        </div>
                    </div>
                    <div class="topbar-ledger-line topbar-ledger-line--heavy" aria-hidden="true"></div>
                </header>

                <div class="catalog-layout">
                    <main class="panel panel--main">
                        <div class="panel-head panel-head--tools">
                            <div class="panel-head-banner">
                                <svg class="ornament ornament--section" preserveAspectRatio="none" aria-hidden="true"><use href="#ornament-section" /></svg>
                                <span class="panel-head-label">Products</span>
                            </div>
                            <div class="search-wrap">
                                <input type="search" id="searchInput" class="search" placeholder="Filter by name…" autocomplete="off" />
                            </div>
                        </div>
                        <div id="productGrid" class="product-grid"></div>
                    </main>

                    <aside class="panel panel--cats">
                        <div class="panel-head">
                            <div class="panel-head-banner">
                                <svg class="ornament ornament--section" preserveAspectRatio="none" aria-hidden="true"><use href="#ornament-section" /></svg>
                                <span class="panel-head-label">Categories</span>
                            </div>
                        </div>
                        <nav id="categoryList" class="cat-list"></nav>
                    </aside>
                </div>
            </section>
        </div>

        <div id="cartModal" class="cart-modal" aria-hidden="true">
            <button type="button" class="cart-modal-scrim" id="cartModalScrim" aria-label="Close bag">&nbsp;</button>
            <div class="cart-modal-dialog cart-modal-dialog--vintage" role="dialog" aria-modal="true" aria-labelledby="cartModalTitle">
                <svg class="vintage-corner-svg vintage-corner-svg--tl" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
                <svg class="vintage-corner-svg vintage-corner-svg--tr" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
                <svg class="vintage-corner-svg vintage-corner-svg--bl" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
                <svg class="vintage-corner-svg vintage-corner-svg--br" aria-hidden="true"><use href="#ornament-shell-corner" /></svg>
                <header class="cart-modal-head">
                    <svg class="ornament ornament--section ornament--cart-head" preserveAspectRatio="none" aria-hidden="true"><use href="#ornament-section" /></svg>
                    <div class="cart-modal-head-row">
                        <h2 id="cartModalTitle" class="cart-modal-title">Your bag</h2>
                        <button type="button" class="icon-btn cart-modal-close" id="btnCloseCartModal" title="Close bag">&times;</button>
                    </div>
                </header>
                <div id="cartBody" class="cart-body cart-body--modal"></div>
                <div class="cart-footer">
                    <div class="cart-total-row">
                        <span>Total</span>
                        <span id="cartTotal" class="cart-total-num">$0.00</span>
                    </div>
                    <button type="button" class="btn btn--primary btn--checkout" id="btnCheckout">Checkout</button>
                    <button type="button" class="btn btn--ghost" id="btnClear">Clear bag</button>
                </div>
            </div>
        </div>
        <div id="manageModal" class="manage-modal" aria-hidden="true">
            <button type="button" class="manage-modal-scrim" id="manageModalScrim" aria-label="Close manager">&nbsp;</button>
            <div class="manage-dialog" role="dialog" aria-modal="true" aria-labelledby="manageTitle">
                <header class="manage-head">
                    <div>
                        <p class="manage-kicker">Business Ledger</p>
                        <h2 id="manageTitle" class="manage-title">Store Management</h2>
                    </div>
                    <button type="button" class="icon-btn manage-close" id="btnCloseManage" title="Close management">&times;</button>
                </header>
                <nav class="manage-tabs" aria-label="Management sections">
                    <button type="button" class="manage-tab is-active" data-tab="details">Details</button>
                    <button type="button" class="manage-tab" data-tab="stock">Stock</button>
                    <button type="button" class="manage-tab" data-tab="buys">Store Buys</button>
                    <button type="button" class="manage-tab" data-tab="register">Register</button>
                    <button type="button" class="manage-tab" data-tab="staff">Staff</button>
                </nav>
                <div id="manageBody" class="manage-body"></div>
            </div>
        </div>
    </div>
    <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>
    <script src="scripts.js"></script>
</body>
</html>
