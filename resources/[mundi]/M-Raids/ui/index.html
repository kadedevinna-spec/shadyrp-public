<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>M-Raids Notifications</title><script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script><link rel="stylesheet" href="./styles.css"></head><body><div id="app"><div v-if="subtitle.show" class="subtitle-container"><div class="subtitle-text" v-html="parseText(subtitle.text)"></div></div><!-- Progress Bar (Standalone) --><transition name="progress-bar-fade"><div v-if="progressBar.show" class="progress-bar-container"><div class="progress-bar-label">{{ progressBar.label }}</div><div class="progress-bar-track"><div class="progress-bar-fill" :style="{ width: progressBar.progress + '%', transition: `width ${progressBar.duration}ms linear` }"></div></div></div></transition><div v-for="(container, position) in notificationContainers" :key="position" :class="['notification-container', position]"><transition-group name="slide-fade" tag="div"><div v-for="notification in container" :key="notification.id" :class="['notification', notification.type]"><img v-if="notification.icon" :src="getIconUrl(notification.icon)" alt="Icon" class="notification-icon"><div class="notification-content"><div class="notification-title" v-html="parseText(notification.title)"></div><div v-if="notification.description" class="notification-description" v-html="parseText(notification.description)"></div></div><div v-if="notification.showProgress" class="progress-bar"><div class="progress-fill" :style="{ width: notification.progress + '%', transition: `width ${notification.duration}ms linear` }"></div></div></div></transition-group></div></div><script src="./app.js"></script></body></html>
