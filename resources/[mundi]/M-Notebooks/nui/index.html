<!doctypehtml><html lang="en"><meta charset="UTF-8"><meta name="viewport"content="width=device-width,initial-scale=1"><title>M-Notebooks</title><link rel="stylesheet"href="https://fonts.googleapis.com/css2?family=Caveat&family=Cedarville+Cursive&family=Indie+Flower&family=Nothing+You+Could+Do&family=Oooh+Baby&family=Reenie+Beanie&family=Shadows+Into+Light&display=swap"><link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><link rel="stylesheet"href="style.css"><div id="notebook-wrapper"class="hidden"><div class="book-container"><div class="book-front-cover"id="book-cover"><div class="cover-front"><div class="cover-plate"><div class="cover-plate-rivets-bottom"></div><h1 class="cover-title"id="cover-title">My Notebook</h1><div class="cover-divider"></div><p class="cover-date"id="cover-date"><p class="cover-owner"id="cover-owner">Owner Name</div></div><div class="cover-back"></div></div><div class="pages-area"id="pages-area"><div class="page left-page"id="left-page"><div class="page-texture"></div><div class="page-content"id="left-page-content"></div><div class="page-number"id="left-page-number">1</div><div class="page-turn-zone left"id="page-turn-left"title="Previous page"></div><div class="page-curl left"></div></div><div class="book-binding"></div><div class="page right-page"id="right-page"><div class="page-texture"></div><div class="page-content"id="right-page-content"></div><div class="page-number"id="right-page-number">2</div><div class="page-turn-zone right"id="page-turn-right"title="Next page"></div><div class="page-curl right"></div></div><div class="page-flip-overlay hidden"id="page-flip-overlay"><div class="flip-page"id="flip-page"></div></div><div class="addr-book-overlay hidden"id="addr-book-overlay"><div class="addr-page addr-page-left"><div class="addr-page-header">Addresses</div><div class="addr-list"id="addr-list"></div></div><div class="addr-page addr-page-right"><div class="addr-page-header">New Entry<
