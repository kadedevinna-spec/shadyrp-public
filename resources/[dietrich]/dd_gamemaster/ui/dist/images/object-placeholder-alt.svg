<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232833"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fbcbb"/>
      <stop offset="100%" stop-color="#88c0d0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="96" height="96" rx="12" fill="url(#bg)"/>
  <!-- Simple 3D box silhouette -->
  <g transform="translate(16,18)" fill="none" stroke="url(#box)" stroke-width="3" opacity="0.85" stroke-linejoin="round">
    <!-- Top face -->
    <polygon points="32,2 56,12 32,22 8,12" fill="none"/>
    <!-- Left face -->
    <polygon points="8,12 32,22 32,48 8,38" fill="none"/>
    <!-- Right face -->
    <polygon points="56,12 32,22 32,48 56,38" fill="none"/>
    <!-- Front bottom edge -->
    <path d="M8,38 L32,48 L56,38"/>
  </g>
  <text x="48" y="86" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#a3be8c" opacity="0.8">Object</text>
</svg>

