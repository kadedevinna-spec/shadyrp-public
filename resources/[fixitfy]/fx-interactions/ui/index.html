<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fixitfy Chair Interactions</title>
        <link rel="stylesheet" href="/ui/style.css">
        <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
        <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
        <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    </head>
<body>
    <div class="chair-select" style="display: none;"></div>
    <div class="menu" style="display: none;">
        <div class="button-animations">
            <iconify-icon icon="majesticons:list-box" width="24" height="24" ></iconify-icon>
            <span class="button-title">ANIMATIONS</span>
        </div>
        <div class="button-favorites">
            <iconify-icon icon="ph:list-star" width="24" height="24" ></iconify-icon>
        </div>
        <img id="border-bottom1" src="/ui/assets/img/borderbottom.png">
        <img id="border-bottom2" src="/ui/assets/img/borderbottom.png">
        <div class="favorites-select">
            <div class="favorites-selectbox">1</div>
            <div class="favorites-selectbox">2</div>
            <div class="favorites-selectbox">3</div>
            <div class="favorites-selectbox">4</div>
            <div class="favorites-selectbox">5</div>
            <div class="favorites-selectbox">6</div>
            <div class="favorites-selectbox">7</div>
        </div>
        <div class="animation-container">
            <div class="animation-box">
                <span>SANDALYE OTUR 1</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
            <div class="animation-box">
                <span>SANDALYE OTUR 2</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
            <div class="animation-box">
                <span>SANDALYE OTUR 3</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
            <div class="animation-box">
                <span>SANDALYE OTUR 4</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
            <div class="animation-box">
                <span>SANDALYE OTUR 5</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
            <div class="animation-box">
                <span>SANDALYE OTUR 6</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
            <div class="animation-box">
                <span>SANDALYE OTUR 7</span>
                <iconify-icon icon="game-icons:wooden-chair" class="anim-icon"></iconify-icon>
            </div>
        </div>
    </div>
    <div class="description-box" style="display: none;">SANDALYE OTUR 1</div>
</body>
<script src="/ui/main.js" type="text/javascript"></script>
</html>
