<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Clock Minigame</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Interface principal da bomba -->
    <div id="minigame-container" class="hidden">
        <div class="bomb-container">
            <!-- Bomb background image -->
            <div class="bomb-background"></div>
            
            <!-- Clock overlay -->
            <div class="clock-container">
                <div class="clock-face">
                    <!-- Clock hands -->
                    <div class="clock-hand hour-hand" id="hour-hand"></div>
                    <div class="clock-hand minute-hand" id="minute-hand"></div>
                    <div class="clock-hand second-hand" id="second-hand"></div>
                    <div class="clock-center"></div>
                </div>
            </div>
            
            <!-- Timer setup -->
            <div class="timer-setup" id="timer-setup">
                <div class="setup-row">
                    <div class="time-input-group">
                        <button id="time-decrease" class="time-control">−</button>
                        <input type="number" id="time-input" min="1" max="300" value="1" placeholder="1">
                        <button id="time-increase" class="time-control">+</button>
                    </div>
                    <button id="start-btn" class="start-btn">START</button>
                    <button id="close-btn" class="close-btn">×</button>
                </div>
            </div>
            
            <!-- Timer display -->
            <div class="timer-display hidden" id="timer-display">
                <span id="timer-text">00:00</span>
            </div>
            
            <!-- Active controls -->
            <div class="controls hidden" id="active-controls">
                <button id="stop-btn" class="control-btn stop-btn">Stop Bomb</button>
            </div>
        </div>
    </div>

    <!-- Interface pequena da bomba (canto direito) -->
    <div id="mini-bomb-display" class="hidden">
        <div class="mini-bomb-container">
            <div class="mini-clock">
                <div class="mini-clock-face">
                    <div class="mini-clock-hand mini-hour-hand" id="mini-hour-hand"></div>
                    <div class="mini-clock-hand mini-minute-hand" id="mini-minute-hand"></div>
                    <div class="mini-clock-hand mini-second-hand" id="mini-second-hand"></div>
                    <div class="mini-clock-center"></div>
                </div>
            </div>
            <div class="mini-timer-text" id="mini-timer-text">00:00</div>
            <div class="mini-bomb-label">BOMB ACTIVE</div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
